ProjectLicense: GPL-3.0-or-later
Name:
  C: ConvertWithMoss
Summary:
  C: 一个简洁的文件格式转换工具
Description:
  C: >-
    <p>
          ConvertWithMoss 是一个轻量级、易用的文件格式转换工具，
          支持多种常见格式之间的相互转换，并提供批量处理功能。
        </p>
    <p>
          主要特性：
          - 支持图像、文档、音视频等格式转换
          - 简洁的图形界面，拖放即可操作
          - 批量处理，提高工作效率
        </p>
