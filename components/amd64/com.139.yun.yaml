  en: Secure and high-speed cloud storage service
Description:
  C: >-
    <p>中国移动云盘是面向个人和家庭用户的云存储服务，为用户提供安全、不限速、移动用户免流的数字资产管理服务。</p>

    <p>主要特性：</p>

    <ul>
      <li>不限速：上传下载免流量（移动用户），畅享极速传输</li>
      <li>大空间：提供海量存储空间，文件照片安全备份</li>
      <li>多端同步：支持手机、电脑、Web端实时同步</li>
      <li>智能相册：AI智能分类，轻松管理照片回忆</li>
    </ul>
