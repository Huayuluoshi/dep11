Type: desktop-application
ID: io.github.gaozhangmin.aliyunpan
ProjectLicense: GPL-3.0-only
Name:
  C: 小白羊网盘
Summary:
  C: 多网盘统一管理客户端，支持阿里云盘、百度网盘、115网盘等
Description:
  C: >-
    <p>
          小白羊网盘是一款功能强大的跨平台网盘客户端，支持主流网盘服务与智能媒体库管理。
        </p>
    <ul>
      <li>多网盘支持：阿里云盘、百度网盘、123网盘、115网盘等，支持 WebDAV 扩展</li>
      <li>智能媒体库：自动刮削 TMDB 元数据，构建海报墙式媒体库</li>
      <li>高清在线播放：支持外挂字幕、多音轨、播放列表及第三方播放器</li>
      <li>高速下载：集成 Aria2 引擎，支持多线程与远程下载至 VPS/NAS</li>
      <li>强大文件管理：文件夹树视图、批量操作、海量文件支持</li>
      <li>跨平台：Windows、macOS、Linux 全平台兼容</li>
    </ul>
ProjectGroup: XiaoBaiYang
